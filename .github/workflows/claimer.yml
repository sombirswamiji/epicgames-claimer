name: "Epic Games Claimer"
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: grbnb/epicgames-claimer
          path: claimer
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Write cookies to file
        run: |
          echo "$COOKIES_JSON" | base64 -d > claimer/cookies.json
        env:
          COOKIES_JSON: ${{ secrets.COOKIES_JSON }}
      - name: Install system dependencies
        working-directory: claimer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb chromium-browser tzdata ffmpeg ibus-gtk3 libgbm1 libasound2t64
      - name: Set timezone
        run: |
          sudo timedatectl set-timezone Asia/Kolkata
      - name: Install Python dependencies
        working-directory: claimer
        run: |
          pip3 install pyppeteer schedule requests
      - name: Run Epic Games Claimer with cookies
        working-directory: claimer
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python3 epicgames_claimer.py --cookies cookies.json --no-headless --once
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
