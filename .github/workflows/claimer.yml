name: "Epic Games Claimer"
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install epicstore_api requests pyotp

      - name: Claim free games via epicstore_api
        env:
          EMAIL: ${{ secrets.EMAIL }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
        run: |
          python - <<'PYEOF'
          import os
          import time
          import pyotp
          import requests
          import json

          EMAIL = os.environ['EMAIL']
          TOTP_SECRET = os.environ.get('TOTP_SECRET', '')

          # Step 1: Initiate password-less login via Epic device auth
          # We use the Launcher client credentials
          LAUNCHER_CLIENT_ID = '34a02cf8f4414e29b15921876da36f9'
          LAUNCHER_CLIENT_SECRET = 'daafbccc737745039dffe53d94fc76cf'

          # Get launcher token first
          token_url = 'https://account-public-service-prod03.ol.epicgames.com/account/api/oauth/token'
          resp = requests.post(
              token_url,
              auth=(LAUNCHER_CLIENT_ID, LAUNCHER_CLIENT_SECRET),
              data={'grant_type': 'client_credentials', 'token_type': 'eg1'}
          )
          resp.raise_for_status()
          client_token = resp.json()['access_token']
          print('Got client credentials token')

          # Step 2: Use exchange code from environment
          EXCHANGE_CODE = os.environ.get('EXCHANGE_CODE', '')
          if not EXCHANGE_CODE:
              print('ERROR: No EXCHANGE_CODE available')
              exit(1)

          # Exchange for user token
          user_resp = requests.post(
              token_url,
              auth=(LAUNCHER_CLIENT_ID, LAUNCHER_CLIENT_SECRET),
              data={
                  'grant_type': 'exchange_code',
                  'exchange_code': EXCHANGE_CODE,
                  'token_type': 'eg1'
              }
          )
          if user_resp.status_code != 200:
              print(f'Token exchange failed: {user_resp.text}')
              exit(1)

          token_data = user_resp.json()
          access_token = token_data['access_token']
          account_id = token_data['account_id']
          print(f'Logged in! Account ID: {account_id}')

          # Step 3: Get free games
          store_resp = requests.get(
              'https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions',
              params={'locale': 'en-US', 'country': 'IN', 'allowCountries': 'IN'}
          )
          games = store_resp.json()['data']['Catalog']['searchStore']['elements']
          headers = {'Authorization': f'Bearer {access_token}'}

          claimed = []
          for game in games:
              promotions = game.get('promotions') or {}
              for offer_group in promotions.get('promotionalOffers', []):
                  for offer in offer_group.get('promotionalOffers', []):
                      if offer.get('discountSetting', {}).get('discountPercentage', 100) == 0:
                          ns = game.get('namespace')
                          oid = game.get('id')
                          title = game.get('title', 'Unknown')
                          order_resp = requests.post(
                              'https://store-launcher.epicgames.com/purchase',
                              headers=headers,
                              json={
                                  'salesChannel': 'Launcher-purchase-client',
                                  'appStore': 'EpicGames',
                                  'appType': 'client',
                                  'offers': [{'offerId': oid, 'namespace': ns}]
                              }
                          )
                          print(f'Game: {title} | Status: {order_resp.status_code}')
                          claimed.append(title)

          print(f'Done! Total free games processed: {len(claimed)}')
          PYEOF
        env:
          EMAIL: ${{ secrets.EMAIL }}
          EXCHANGE_CODE: ${{ secrets.EXCHANGE_CODE }}
