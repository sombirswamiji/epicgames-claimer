name: "Epic Games Claimer"
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    env:
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      EXCHANGE_CODE: ${{ secrets.EXCHANGE_CODE }}
    steps:
      - name: Login and claim free games
        run: |
          LAUNCHER_ID="34a02cf8f4414e29b15921876da36f9"
          LAUNCHER_SECRET="daafbccc737745039dffe53d94fc76cf"
          WEB_CLIENT_ID="875a3b57d3a640a6b7f9b4e883463ab4"
          TOKEN_URL="https://account-public-service-prod03.ol.epicgames.com/account/api/oauth/token"

          TOKEN_DATA=""

          # Method 1: Try REFRESH_TOKEN first (persistent)
          if [ -n "$REFRESH_TOKEN" ]; then
            echo "Trying REFRESH_TOKEN..."
            TOKEN_DATA=$(curl -s -X POST "$TOKEN_URL" \
              -u "${LAUNCHER_ID}:${LAUNCHER_SECRET}" \
              -d "grant_type=refresh_token&refresh_token=${REFRESH_TOKEN}&token_type=eg1")
            if echo "$TOKEN_DATA" | grep -q '"access_token"'; then
              echo "Login successful via REFRESH_TOKEN!"
            else
              echo "REFRESH_TOKEN failed: $TOKEN_DATA"
              TOKEN_DATA=""
            fi
          fi

          # Method 2: Try authorization_code with web client
          if [ -z "$TOKEN_DATA" ] && [ -n "$EXCHANGE_CODE" ]; then
            echo "Trying authorization_code..."
            TOKEN_DATA=$(curl -s -X POST "$TOKEN_URL" \
              -u "${WEB_CLIENT_ID}:" \
              -d "grant_type=authorization_code&code=${EXCHANGE_CODE}&token_type=eg1")
            if echo "$TOKEN_DATA" | grep -q '"access_token"'; then
              echo "Login successful via authorization_code!"
            else
              echo "authorization_code failed: $TOKEN_DATA"
              TOKEN_DATA=""
            fi
          fi

          # Method 3: Try exchange_code with launcher client
          if [ -z "$TOKEN_DATA" ] && [ -n "$EXCHANGE_CODE" ]; then
            echo "Trying exchange_code..."
            TOKEN_DATA=$(curl -s -X POST "$TOKEN_URL" \
              -u "${LAUNCHER_ID}:${LAUNCHER_SECRET}" \
              -d "grant_type=exchange_code&exchange_code=${EXCHANGE_CODE}&token_type=eg1")
            if echo "$TOKEN_DATA" | grep -q '"access_token"'; then
              echo "Login successful via exchange_code!"
            else
              echo "exchange_code failed: $TOKEN_DATA"
              TOKEN_DATA=""
            fi
          fi

          if [ -z "$TOKEN_DATA" ]; then
            echo "ERROR: All login methods failed."
            echo "ACTION: Get fresh authorizationCode from: https://www.epicgames.com/id/api/redirect?clientId=875a3b57d3a640a6b7f9b4e883463ab4&responseType=code"
            echo "Update EXCHANGE_CODE secret in GitHub and re-run immediately."
            exit 1
          fi

          ACCESS_TOKEN=$(echo "$TOKEN_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['access_token'])")
          ACCOUNT_ID=$(echo "$TOKEN_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['account_id'])")
          NEW_REFRESH=$(echo "$TOKEN_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('refresh_token',''))")

          echo "Logged in! Account: $ACCOUNT_ID"
          if [ -n "$NEW_REFRESH" ]; then
            echo "SAVE AS REFRESH_TOKEN secret: $NEW_REFRESH"
          fi

          # Fetch and claim free games
          STORE=$(curl -s "https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=en-US&country=IN&allowCountries=IN")
          echo "$STORE" | python3 - <<'PYEOF'
          import sys, json, subprocess, os
          store = json.loads(subprocess.check_output(['bash', '-c', 'cat /dev/stdin'], input=os.environ.get('STORE', '').encode() if False else b''))
          PYEOF

          echo "$STORE" | python3 -c "
          import sys, json, subprocess

          ACCESS_TOKEN = '$(echo $ACCESS_TOKEN)'
          store = json.loads(sys.stdin.read())
          games = store['data']['Catalog']['searchStore']['elements']

          import urllib.request
          claimed = []
          for game in games:
              promotions = game.get('promotions') or {}
              for og in promotions.get('promotionalOffers', []):
                  for offer in og.get('promotionalOffers', []):
                      if offer.get('discountSetting', {}).get('discountPercentage', 100) == 0:
                          ns = game.get('namespace')
                          oid = game.get('id')
                          title = game.get('title', 'Unknown')
                          data = json.dumps({'salesChannel': 'Launcher-purchase-client', 'appStore': 'EpicGames', 'appType': 'client', 'offers': [{'offerId': oid, 'namespace': ns}]}).encode()
                          req = urllib.request.Request('https://store-launcher.epicgames.com/purchase', data=data, headers={'Authorization': f'Bearer {ACCESS_TOKEN}', 'Content-Type': 'application/json'})
                          try:
                              r = urllib.request.urlopen(req)
                              print(f'{title}: {r.status}')
                          except Exception as e:
                              print(f'{title}: {e}')
                          claimed.append(title)
          print(f'Total games processed: {len(claimed)}')
          "
