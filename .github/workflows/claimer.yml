name: "Epic Games Claimer"
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    env:
      EMAIL: ${{ secrets.EMAIL }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      EXCHANGE_CODE: ${{ secrets.EXCHANGE_CODE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Claim free games
        run: |
          python - <<'PYEOF'
          import os
          import requests

          EMAIL = os.environ.get('EMAIL', '')
          REFRESH_TOKEN = os.environ.get('REFRESH_TOKEN', '')
          EXCHANGE_CODE = os.environ.get('EXCHANGE_CODE', '')

          LAUNCHER_ID = '34a02cf8f4414e29b15921876da36f9'
          LAUNCHER_SECRET = 'daafbccc737745039dffe53d94fc76cf'
          WEB_CLIENT_ID = '875a3b57d3a640a6b7f9b4e883463ab4'
          TOKEN_URL = 'https://account-public-service-prod03.ol.epicgames.com/account/api/oauth/token'

          token_data = None

          # Method 1: Try refresh_token (persistent, best for scheduled runs)
          if REFRESH_TOKEN:
              print('Attempting login with REFRESH_TOKEN...')
              resp = requests.post(
                  TOKEN_URL,
                  auth=(LAUNCHER_ID, LAUNCHER_SECRET),
                  data={
                      'grant_type': 'refresh_token',
                      'refresh_token': REFRESH_TOKEN,
                      'token_type': 'eg1'
                  }
              )
              if resp.status_code == 200:
                  token_data = resp.json()
                  print('Login successful via REFRESH_TOKEN!')
              else:
                  print(f'REFRESH_TOKEN login failed: {resp.text}')

          # Method 2: Try authorization_code with web client (from /api/redirect endpoint)
          if not token_data and EXCHANGE_CODE:
              print('Attempting login with authorization_code (web client)...')
              resp = requests.post(
                  TOKEN_URL,
                  auth=(WEB_CLIENT_ID, ''),
                  data={
                      'grant_type': 'authorization_code',
                      'code': EXCHANGE_CODE,
                      'token_type': 'eg1'
                  }
              )
              if resp.status_code == 200:
                  token_data = resp.json()
                  print('Login successful via authorization_code!')
              else:
                  print(f'authorization_code login failed: {resp.text}')
                  # Method 3: Try exchange_code with launcher client
                  print('Attempting login with exchange_code (launcher client)...')
                  resp2 = requests.post(
                      TOKEN_URL,
                      auth=(LAUNCHER_ID, LAUNCHER_SECRET),
                      data={
                          'grant_type': 'exchange_code',
                          'exchange_code': EXCHANGE_CODE,
                          'token_type': 'eg1'
                      }
                  )
                  if resp2.status_code == 200:
                      token_data = resp2.json()
                      print('Login successful via exchange_code!')
                  else:
                      print(f'exchange_code login failed: {resp2.text}')

          if not token_data:
              print('ERROR: All login methods failed.')
              print('ACTION REQUIRED: Visit https://www.epicgames.com/id/api/redirect?clientId=875a3b57d3a640a6b7f9b4e883463ab4&responseType=code')
              print('Copy the authorizationCode value and update the EXCHANGE_CODE secret in GitHub.')
              exit(1)

          access_token = token_data['access_token']
          account_id = token_data['account_id']
          new_refresh_token = token_data.get('refresh_token', '')

          print(f'Logged in! Account: {account_id}')
          if new_refresh_token:
              print(f'SAVE THIS as REFRESH_TOKEN secret: {new_refresh_token}')

          # Fetch free games
          store_resp = requests.get(
              'https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions',
              params={'locale': 'en-US', 'country': 'IN', 'allowCountries': 'IN'}
          )
          games = store_resp.json()['data']['Catalog']['searchStore']['elements']
          headers = {'Authorization': f'Bearer {access_token}'}

          claimed = []
          for game in games:
              promotions = game.get('promotions') or {}
              for og in promotions.get('promotionalOffers', []):
                  for offer in og.get('promotionalOffers', []):
                      if offer.get('discountSetting', {}).get('discountPercentage', 100) == 0:
                          ns = game.get('namespace')
                          oid = game.get('id')
                          title = game.get('title', 'Unknown')
                          r = requests.post(
                              'https://store-launcher.epicgames.com/purchase',
                              headers=headers,
                              json={
                                  'salesChannel': 'Launcher-purchase-client',
                                  'appStore': 'EpicGames',
                                  'appType': 'client',
                                  'offers': [{'offerId': oid, 'namespace': ns}]
                              }
                          )
                          print(f'{title}: {r.status_code}')
                          claimed.append(title)

          print(f'Total games processed: {len(claimed)}')
          PYEOF
